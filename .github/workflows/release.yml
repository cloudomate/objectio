# Manual release pipeline.
#
# How to run:
#   GitHub UI → Actions → "Release" → "Run workflow"
#     - version:    semver, no leading 'v' (e.g. 0.1.1)
#     - prerelease: tick if this is an RC / beta
#
# What it does:
#   1. Validates the version, bumps [workspace.package].version in
#      Cargo.toml on main, commits "chore: release v<version>",
#      creates tag v<version>, pushes both.
#   2. Matrix-builds binaries for:
#        linux-x86_64 (with ISA-L)
#        linux-aarch64
#        macos-x86_64
#        macos-aarch64
#        windows-x86_64
#      Tarball / zip each, with LICENSE + NOTICE + README.
#   3. Builds the universal multi-arch image (Dockerfile target `all`,
#      linux/amd64 + linux/arm64) and pushes to
#      ghcr.io/<owner>/objectio:v<version> and :latest.
#   4. Creates a GitHub Release with every tarball/zip + a
#      SHA256SUMS.txt, using auto-generated release notes.
#
# Required repo settings:
#   - "Actions → General → Workflow permissions" = "Read and write"
#     (needed to push the version-bump commit + tag + create release).
#   - Package visibility on GHCR: the image is created under the repo
#     owner; the first push creates the package, then configure it
#     as public under Packages → objectio → Package settings.
#
# Can only be dispatched from the main branch.

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (semver, no leading 'v'; e.g. 0.1.1)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: false

permissions:
  contents: write   # push commit, push tag, create release
  packages: write   # push image to ghcr.io

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/objectio

jobs:
  # ------------------------------------------------------------
  # 1. Tag the release from main
  # ------------------------------------------------------------
  prepare:
    name: Bump version and tag
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Validate version
        run: |
          VER="${{ inputs.version }}"
          if ! [[ "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::'$VER' is not valid semver (expected X.Y.Z or X.Y.Z-prerelease)"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if tag already exists
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Install Rust (for cargo update)
        uses: dtolnay/rust-toolchain@stable

      - name: Bump workspace version
        run: |
          # [workspace.package].version is the single source of truth
          # for every crate (all crates use version.workspace = true).
          sed -i -E \
            '/^\[workspace\.package\]/,/^\[/{s/^version = "[^"]*"$/version = "${{ inputs.version }}"/}' \
            Cargo.toml
          grep -A1 '^\[workspace.package\]' Cargo.toml | head -5
          cargo update --workspace

      - name: Commit, tag, push
        id: tag
        run: |
          git config user.name  "objectio-release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          # Tolerate the "version already matches" case — happens when we
          # roll back a failed release and re-dispatch the same version.
          # The tag still needs to go on the current HEAD; we just skip
          # the empty bump commit.
          if git diff --cached --quiet; then
            echo "workspace version already at ${{ inputs.version }} — skipping bump commit"
          else
            git commit -m "chore: release v${{ inputs.version }}"
            git push origin main
          fi
          git tag -a "v${{ inputs.version }}" -m "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
          echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------
  # 2. Build the objectio-aio binary per platform.
  #
  # Rationale: the release carries *only* objectio-aio as a download
  # artifact. Every other binary (gateway, meta, osd, block-gateway,
  # cli, install) ships inside the single container image produced
  # below and consumed by helm — having a separate binary tarball
  # for them adds churn without a deployment story.
  #
  # Artifact naming follows Docker platform conventions
  # (linux-amd64, linux-arm64, darwin-arm64) rather than Rust
  # target triples — the "unknown" vendor field in e.g.
  # aarch64-unknown-linux-gnu is correct but confusing.
  #
  # Windows is not built: objectio-aio transitively depends on
  # crates/objectio-storage (raw-disk I/O engine) which uses
  # unix-only APIs — ioctl BLKGETSIZE64, O_DIRECT,
  # std::os::unix::fs::FileTypeExt. A windows port would be real
  # work, not a cfg-gate.
  # ------------------------------------------------------------
  build-binaries:
    name: Build aio ${{ matrix.platform }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            features: "isal"
          - platform: linux-arm64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            features: ""
          - platform: darwin-arm64
            target: aarch64-apple-darwin
            os: macos-14
            features: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # objectio-aio embeds the console SPA at compile time via
      # include_dir!("$CARGO_MANIFEST_DIR/../../console/dist"). The tree
      # is .gitignored, so the tag checkout has nothing — build it here
      # before cargo runs.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Build console SPA
        shell: bash
        working-directory: console
        run: |
          npm ci --no-audit --no-fund --prefer-offline
          npm run build

      - name: Install ISA-L build deps (linux-amd64 only)
        if: matrix.platform == 'linux-amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm autoconf automake libtool libclang-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-aio-${{ matrix.target }}

      - name: Cargo build (aio only)
        shell: bash
        run: |
          FEAT=""
          if [ -n "${{ matrix.features }}" ]; then FEAT="--features ${{ matrix.features }}"; fi
          cargo build --release --target ${{ matrix.target }} --bin objectio-aio $FEAT

      - name: Rename + checksum
        shell: bash
        run: |
          VER="${{ inputs.version }}"
          OUT="dist"
          mkdir -p "$OUT"
          NAME="objectio-aio-v${VER}-${{ matrix.platform }}"
          cp "target/${{ matrix.target }}/release/objectio-aio" "$OUT/$NAME"
          chmod +x "$OUT/$NAME"
          (cd "$OUT" && shasum -a 256 "$NAME" > "$NAME.sha256")
          ls -lh "$OUT"

      - uses: actions/upload-artifact@v4
        with:
          name: aio-${{ matrix.platform }}
          path: dist/objectio-aio-*
          if-no-files-found: error

  # ------------------------------------------------------------
  # 3a. Build the per-arch image on its native runner.
  #     QEMU-emulated Rust compilation for arm64 on an amd64 runner
  #     took 25+ min; native arm64 on ubuntu-24.04-arm drops it to
  #     ~7 min, matching the amd64 build.
  # ------------------------------------------------------------
  build-image-arch:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            os: ubuntu-24.04
          - arch: arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          # GHCR_TOKEN = classic PAT with write:packages (owned by
          # repository_owner). Preferred over GITHUB_TOKEN because
          # fine-grained / repo-scoped defaults tripped denied:
          # permission_denied: write_package on the first attempts.
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: all
          platforms: linux/${{ matrix.arch }}
          push: true
          # Push by digest only — no tag here. The manifest job below
          # stitches the per-arch digests into the version + latest tags.
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max
          provenance: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ------------------------------------------------------------
  # 3b. Stitch the two per-arch digests into a multi-arch manifest,
  #     published as IMAGE:<tag> and IMAGE:latest.
  # ------------------------------------------------------------
  build-image-manifest:
    name: Publish multi-arch manifest
    needs: [prepare, build-image-arch]
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          # GHCR_TOKEN = classic PAT with write:packages (owned by
          # repository_owner). Preferred over GITHUB_TOKEN because
          # fine-grained / repo-scoped defaults tripped denied:
          # permission_denied: write_package on the first attempts.
          password: ${{ secrets.GHCR_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: image-digest-*
          merge-multiple: true

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          docker buildx imagetools create \
            -t "${{ env.IMAGE }}:${TAG}" \
            -t "${{ env.IMAGE }}:latest" \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)
          docker buildx imagetools inspect "${{ env.IMAGE }}:${TAG}"

  # ------------------------------------------------------------
  # 4. Create the GitHub release
  # ------------------------------------------------------------
  release:
    name: Create GitHub release
    needs: [prepare, build-binaries, build-image-manifest]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: aio-*
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        run: |
          cd dist
          ls -lh
          # individual .sha256 files arrived with each platform upload;
          # concat into one canonical manifest consumed with shasum -c.
          cat *.sha256 > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Release body
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          IMG="${{ env.IMAGE }}:${TAG}"
          cat > /tmp/header.md <<EOF
          ### Container image

          One multi-arch image carries every service (gateway / meta /
          osd / block-gateway / cli) — the same image the helm chart
          deploys. Each container overrides the entrypoint.

          \`\`\`sh
          docker pull ${IMG}
          # also tagged: ${{ env.IMAGE }}:latest
          \`\`\`

          Platforms: \`linux/amd64\`, \`linux/arm64\`.

          ### objectio-aio binary

          \`objectio-aio\` is the single-binary monolith that runs
          meta + OSD + gateway in one process — ideal for
          laptops, quick tests, and appliance deployments. Pick
          the right platform:

          | Platform | Download |
          |---|---|
          | Linux x86_64 | \`objectio-aio-${TAG}-linux-amd64\` |
          | Linux arm64  | \`objectio-aio-${TAG}-linux-arm64\`  |
          | macOS Apple Silicon | \`objectio-aio-${TAG}-darwin-arm64\` |

          \`\`\`sh
          curl -LO https://github.com/${{ github.repository }}/releases/download/${TAG}/objectio-aio-${TAG}-linux-amd64
          chmod +x objectio-aio-${TAG}-linux-amd64
          ./objectio-aio-${TAG}-linux-amd64
          \`\`\`

          Verify: \`shasum -a 256 -c SHA256SUMS.txt\`

          For production, use the container image with the helm chart.
          The aio binary is for quick-start / dev / appliance use only.

          ---
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          body_path: /tmp/header.md
          append_body: true
          files: |
            dist/objectio-aio-*
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
