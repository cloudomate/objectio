[package]
name = "objectio-osd"
description = "Object Storage Daemon for ObjectIO"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "objectio-osd"
path = "src/main.rs"

[dependencies]
objectio-common = { workspace = true }
objectio-storage = { workspace = true }
objectio-erasure = { workspace = true }
objectio-proto = { workspace = true }
objectio-block = { workspace = true }
tokio = { workspace = true }
tonic = { workspace = true }
axum = { workspace = true }
clap = { workspace = true }
config = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
hex = { workspace = true }
uuid = { workspace = true }
parking_lot = { workspace = true }
crc32c = { workspace = true }
serde = { workspace = true }
bincode = { workspace = true }
prost = { workspace = true }
futures = { workspace = true }
toml = "0.8"
gethostname = "0.5"
sys-info = "0.9"

[features]
default = []
# Opt-in: route shard I/O through io_uring instead of spawn_blocking
# + pread. Linux 5.6+ only; no-op on macOS / Windows. Measured +25%
# throughput on 4 MiB stripes (see objectio-docs storage-io-levels).
io-uring = ["objectio-storage/io-uring"]
