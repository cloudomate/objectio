[package]
name = "objectio-aio"
description = "ObjectIO all-in-one — single-command supervisor for meta + OSD + gateway"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "objectio-aio"
path = "src/main.rs"

[dependencies]
# aio links directly against each service crate's lib — they run as
# tokio tasks in the same process, not as child processes. One
# tracing subscriber, one Ctrl-C handler, one memory space.
objectio-meta = { path = "../objectio-meta" }
objectio-osd = { path = "../objectio-osd" }
objectio-gateway = { path = "../objectio-gateway" }

anyhow = { workspace = true }
clap = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
which = "6"
tempfile = "3"
