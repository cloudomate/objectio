[package]
name = "objectio-aio"
description = "ObjectIO all-in-one — single-command supervisor for meta + OSD + gateway"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "objectio-aio"
path = "src/main.rs"

[dependencies]
# aio links directly against each service crate's lib — they run as
# tokio tasks in the same process, not as child processes. One
# tracing subscriber, one Ctrl-C handler, one memory space.
objectio-meta = { path = "../objectio-meta" }
objectio-osd = { path = "../objectio-osd" }
objectio-gateway = { path = "../objectio-gateway" }

anyhow = { workspace = true }
base64 = { workspace = true }
clap = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
which = "6"
tempfile = "3"
include_dir = "0.7"

[features]
default = []
# Propagates to objectio-osd → objectio-storage. Linux-only win; safe
# no-op elsewhere. Enable on Linux release builds to get +25%
# throughput + -43% p99.9 on 4 MiB object stripes.
io-uring = ["objectio-osd/io-uring"]
# Pluggable grep engines — propagate into the embedded gateway.
# pcre2 needs libpcre2-dev at build time; hyperscan needs
# libhyperscan-dev (Linux x86_64 primary). Off by default so
# macOS / Windows builds stay pure-Rust.
grep-pcre2 = ["objectio-gateway/pcre2"]
grep-hyperscan = ["objectio-gateway/hyperscan"]
