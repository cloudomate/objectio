// ============================================================
// Server-Side Encryption
// ============================================================

// Encryption algorithm for an object.
// Per-bucket defaults use the same enum (SSE_C cannot be a bucket default).
enum SseAlgorithm {
    SSE_NONE = 0;       // Plaintext (absent field on ObjectMeta defaults here)
    SSE_S3 = 1;         // AES256, server-managed DEK wrapped by service master key
    SSE_KMS = 2;        // aws:kms — DEK wrapped by external KMS
    SSE_C = 3;          // Customer-provided key (per-request only; never a bucket default)
}

// One rule inside BucketSseConfiguration. AWS allows exactly one rule today;
// we model it as repeated for wire compatibility with the AWS XML schema.
message SseRule {
    SseAlgorithm algorithm = 1;
    string kms_key_id = 2;          // KMS key ARN (SSE_KMS only)
    bool bucket_key_enabled = 3;    // S3 Bucket Keys optimization (SSE_KMS only)
}

// Default server-side encryption for a bucket.
// Applied when a PutObject request does not specify its own SSE headers.
message BucketSseConfiguration {
    repeated SseRule rules = 1;
}

message PutBucketEncryptionRequest {
    string bucket = 1;
    BucketSseConfiguration config = 2;
}
message PutBucketEncryptionResponse { bool success = 1; }

message GetBucketEncryptionRequest { string bucket = 1; }
message GetBucketEncryptionResponse {
    BucketSseConfiguration config = 1;
    bool found = 2;
}

message DeleteBucketEncryptionRequest { string bucket = 1; }
message DeleteBucketEncryptionResponse { bool success = 1; }

// ============================================================
// KMS Keys (for SSE-KMS)
// ============================================================

enum KmsKeyStatus {
    KMS_KEY_ENABLED = 0;
    KMS_KEY_DISABLED = 1;
    KMS_KEY_PENDING_DELETION = 2;
}

// A KMS key entry. The gateway never sends plaintext key material over
// the wire — `wrapped_key_material` is always encrypted by the gateway's
// service master key (env `OBJECTIO_MASTER_KEY`). Meta stores the blob
// verbatim and returns it on read; the gateway unwraps in-process.
message KmsKey {
    string key_id = 1;                 // Short id, e.g. "obj-2026-04-17-abc"
    string arn = 2;                    // arn:obio:kms:::{key_id}
    string description = 3;
    bytes wrapped_key_material = 4;    // Encrypted by service master key
    KmsKeyStatus status = 5;
    uint64 created_at = 6;
    uint64 updated_at = 7;
    string created_by = 8;             // User ARN that created the key
}

message CreateKmsKeyRequest {
    string key_id = 1;                 // Optional: server generates if empty
    string description = 2;
    bytes wrapped_key_material = 3;    // Already-wrapped 32 bytes
    string created_by = 4;
}
message CreateKmsKeyResponse { KmsKey key = 1; }

message GetKmsKeyRequest { string key_id = 1; }
message GetKmsKeyResponse { KmsKey key = 1; bool found = 2; }

message ListKmsKeysRequest {
    uint32 max_results = 1;
    string page_token = 2;
}
message ListKmsKeysResponse {
    repeated KmsKey keys = 1;
    string next_page_token = 2;
}

message DeleteKmsKeyRequest { string key_id = 1; }
message DeleteKmsKeyResponse { bool success = 1; }
