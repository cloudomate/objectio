apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "objectio.gateway.fullname" . }}
  labels:
    {{- include "objectio.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "objectio.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "objectio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      {{- if and .Values.gateway.hostProvider.enabled (eq .Values.gateway.hostProvider.kind "k8s") }}
      serviceAccountName: {{ include "objectio.gateway.fullname" . }}
      {{- end }}
      containers:
        - name: gateway
          image: {{ include "objectio.image" (dict "global" .Values.global "component" .Values.gateway) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["objectio-gateway"]
          args:
            - "--listen"
            - "0.0.0.0:{{ .Values.gateway.service.port }}"
            - "--meta-endpoint"
            - "http://{{ include "objectio.meta.fullname" . }}:{{ .Values.meta.service.port }}"
            - "--ec-k"
            - {{ .Values.ec.k | quote }}
            - "--ec-m"
            - {{ .Values.ec.m | quote }}
            - "--warehouse-location"
            - {{ .Values.gateway.warehouseLocation | quote }}
            - "--region"
            - {{ .Values.gateway.region | quote }}
            {{- if .Values.gateway.noAuth }}
            - "--no-auth"
            {{- end }}
            - "--external-endpoint"
            - {{ .Values.gateway.deltaSharing.externalEndpoint | quote }}
            - "--delta-access-key-id"
            - {{ .Values.gateway.deltaSharing.accessKeyId | quote }}
            - "--delta-secret-key"
            - {{ .Values.gateway.deltaSharing.secretKey | quote }}
            - "--log-level"
            - {{ .Values.gateway.logLevel | quote }}
            {{- if .Values.gateway.hostProvider.enabled }}
            - "--host-provider"
            - {{ .Values.gateway.hostProvider.kind | quote }}
            - "--host-provider-osd-sts"
            - {{ include "objectio.osd.fullname" . | quote }}
            {{- end }}
            {{- if .Values.gateway.kms }}
            - "--kms-backend"
            - {{ .Values.gateway.kms.backend | default "local" | quote }}
            {{- end }}
            {{- if .Values.gateway.oidc.issuerUrl }}
            - "--oidc-issuer-url"
            - {{ .Values.gateway.oidc.issuerUrl | quote }}
            - "--oidc-client-id"
            - {{ .Values.gateway.oidc.clientId | quote }}
            - "--oidc-client-secret"
            - {{ .Values.gateway.oidc.clientSecret | quote }}
            {{- if .Values.gateway.oidc.audience }}
            - "--oidc-audience"
            - {{ .Values.gateway.oidc.audience | quote }}
            {{- end }}
            {{- if .Values.gateway.oidc.groupsClaim }}
            - "--oidc-groups-claim"
            - {{ .Values.gateway.oidc.groupsClaim | quote }}
            {{- end }}
            {{- if .Values.gateway.oidc.scopes }}
            - "--oidc-scopes"
            - {{ .Values.gateway.oidc.scopes | quote }}
            {{- end }}
            {{- if .Values.gateway.oidc.adminRoles }}
            - "--oidc-admin-roles"
            - {{ .Values.gateway.oidc.adminRoles | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.gateway.topology }}
            {{- if .region }}
            - "--topology-region"
            - {{ .region | quote }}
            {{- end }}
            {{- if .zone }}
            - "--topology-zone"
            - {{ .zone | quote }}
            {{- end }}
            {{- if .datacenter }}
            - "--topology-datacenter"
            - {{ .datacenter | quote }}
            {{- end }}
            {{- if .rack }}
            - "--topology-rack"
            - {{ .rack | quote }}
            {{- end }}
            {{- end }}
          env:
            # Always present — the host provider (even if noop) reads
            # POD_NAMESPACE from the downward API. SSE / KMS envs
            # below are conditional on gateway.sse.enabled.
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.gateway.sse.enabled }}
            - name: OBJECTIO_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "objectio.gateway.fullname" . }}-sse
                  key: master-key
            {{- if eq (.Values.gateway.kms.backend | default "local") "vault" }}
            - name: VAULT_ADDR
              value: {{ .Values.gateway.kms.vault.addr | quote }}
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gateway.kms.vault.tokenSecretName | default (printf "%s-vault" (include "objectio.gateway.fullname" .)) }}
                  key: token
            {{- if .Values.gateway.kms.vault.transitPath }}
            - name: VAULT_TRANSIT_PATH
              value: {{ .Values.gateway.kms.vault.transitPath | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
