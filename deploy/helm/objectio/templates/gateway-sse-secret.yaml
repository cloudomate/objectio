{{- if .Values.gateway.sse.enabled }}
{{- $secretName := printf "%s-sse" (include "objectio.gateway.fullname" .) -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "objectio.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
type: Opaque
data:
  # Precedence: explicit values.yaml value > existing secret > generated once.
  # Regenerating the key would render all existing SSE-S3 objects unreadable,
  # so we go out of our way to preserve it across `helm upgrade`.
  #
  # Encoding: the app expects OBJECTIO_MASTER_KEY = base64(32 raw bytes), so
  # `data.master-key` (a k8s Secret `data` field, which itself expects base64)
  # must be base64(base64(32 raw bytes)). Hence the double `b64enc` on the
  # freshly-generated path.
  {{- if .Values.gateway.sse.masterKey }}
  master-key: {{ .Values.gateway.sse.masterKey | b64enc | quote }}
  {{- else if and $existing (index $existing.data "master-key") }}
  master-key: {{ index $existing.data "master-key" | quote }}
  {{- else }}
  master-key: {{ randAlphaNum 32 | b64enc | b64enc | quote }}
  {{- end }}
{{- end }}
