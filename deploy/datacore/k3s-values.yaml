# ObjectIO Datacore K3s Deployment
# Single-replica services with 3+2 erasure coding (5 OSDs)
# ~200GB usable S3 storage (70Gi × 5 OSDs × 60% EC efficiency ≈ 210GB usable)
#
# Deploy:
#   helm install objectio deploy/helm/objectio -n objectio --create-namespace -f deploy/datacore/k3s-values.yaml
#
# Verify:
#   kubectl get pods -n objectio
#   kubectl port-forward -n objectio svc/objectio-gateway 9000:9000
#   aws --endpoint-url http://localhost:9000 s3 mb s3://test-bucket

global:
  imageRegistry: ghcr.io/cloudomate
  imagePullPolicy: IfNotPresent
  # Unified all-in-one image (rook-ceph style: one image, different entrypoints)
  image:
    repository: objectio
    tag: latest

gateway:
  replicas: 1
  noAuth: false
  deltaSharing:
    externalEndpoint: "https://s3.imys.in"
  logLevel: info
  region: us-east-1
  # Gateway sits in the same failure domain as the OSDs in this single-site
  # datacore cluster, so every shard read is "same-rack" — good baseline to
  # verify the locality metrics work correctly.
  topology:
    region: local
    datacenter: datacore
    rack: rack1
  oidc:
    # Example Entra (Azure AD) config. Replace tenant UUID + client ID +
    # secret with your own before deploying. Secret should be managed as a
    # sealed-secret or loaded from an external secret store in production;
    # inlining it here is only acceptable for private forks.
    issuerUrl: "https://login.microsoftonline.com/YOUR-TENANT-UUID/v2.0"
    clientId: "YOUR-CLIENT-UUID"
    clientSecret: "REPLACE-WITH-YOUR-OIDC-CLIENT-SECRET"
    audience: "b6e6a0ae-c665-470c-808d-161c2fa37323"
    groupsClaim: "groups"
    scopes: "openid profile email"
    adminRoles: "YOUR-OIDC-ADMIN-GROUP-UUID"
  sse:
    enabled: true
  kms:
    backend: vault
    vault:
      addr: "http://vault-dev.objectio.svc.cluster.local:8200"
      transitPath: transit
      tokenSecretName: vault-dev-token
  service:
    type: ClusterIP
    port: 9000
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/proxy-buffering: "off"
      nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
      nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
      nginx.ingress.kubernetes.io/proxy-max-temp-file-size: "0"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    hosts:
      - host: s3.imys.in
    tls: []

meta:
  replicas: 1
  logLevel: info
  service:
    port: 9100
    metricsPort: 9101
  persistence:
    size: 5Gi
    storageClass: standard
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

osd:
  replicas: 5
  logLevel: info
  service:
    port: 9200
    metricsPort: 9201
  persistence:
    data:
      size: 200Gi
      storageClass: standard
    state:
      size: 2Gi
      storageClass: standard
  failureDomain:
    region: local
    datacenter: datacore
    rack: rack1
  storage:
    blockSize: 4194304
    diskFile: disk.raw
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

ec:
  k: 3
  m: 2

blockGateway:
  enabled: false

monitoring:
  enabled: false
